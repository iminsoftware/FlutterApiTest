name: imin_hardware_plugin
description: A comprehensive Flutter plugin for controlling iMin POS device hardware features including display, cashbox, light, NFC, scanner, MSR, scale, serial port, segment display, floating window, and camera scanning.
version: 1.0.0
homepage: https://github.com/yourusername/imin_hardware_plugin
repository: https://github.com/yourusername/imin_hardware_plugin
issue_tracker: https://github.com/yourusername/imin_hardware_plugin/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.imin.hardware
        pluginClass: IminHardwarePlugin
