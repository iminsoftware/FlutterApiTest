name: imin_hardware_plugin
description: A comprehensive Flutter plugin for controlling iMin POS device hardware features including printer, display, cashbox, light, NFC, RFID, scanner, MSR, electronic scale, serial port, segment display, floating window, and camera scanning.
version: 1.0.5
homepage: https://github.com/iminsoftware/FlutterApiTest
repository: https://github.com/iminsoftware/FlutterApiTest
issue_tracker: https://github.com/iminsoftware/FlutterApiTest/issues
documentation: https://github.com/iminsoftware/FlutterApiTest/blob/main/README.md

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.imin.hardware
        pluginClass: IminHardwarePlugin

# 主题标签（帮助用户搜索）- 最多 5 个
topics:
  - pos
  - printer
  - hardware
  - imin
  - scanner
