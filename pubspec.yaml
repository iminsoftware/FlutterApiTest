name: imin_hardware_plugin
description: A Flutter plugin for iMin POS hardware control (Display, Scanner, NFC, RFID, etc.)
version: 0.4.0
homepage: https://github.com/yourusername/imin_hardware_plugin

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.imin.hardware
        pluginClass: IminHardwarePlugin
